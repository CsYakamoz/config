# plugin {{{ #
    set -g @plugin 'samoshkin/tmux-plugin-sysstat'
    set -g @sysstat_cpu_view_tmpl 'C:#{cpu.pused}'
    set -g @sysstat_mem_view_tmpl 'M:#{mem.pused}'

    run '~/.tmux/plugins/tpm/tpm'
# }}} plugin #

