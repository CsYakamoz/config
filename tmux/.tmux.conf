# basic {{{ #
    # 个人习惯的前缀键
    unbind C-b
    set-option -g prefix `
    bind ` send-prefix

    # prefix-[ 进入复制模式，复制模式下使用 vi 模式
    setw -g mode-keys vi
    # 复制模式下 v 开始选择, y 复制已选择区域
    bind -T copy-mode-vi v send-keys -X begin-selection
    bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

    # How to use true colors in vim under tmux?
    # link: https://github.com/tmux/tmux/issues/1246
    set -ga terminal-overrides ",*256col*:RGB"
    set-option -sg escape-time 10
    set-option -g default-terminal "screen-256color"

    # 限制缓存大小
    set-option -g history-limit 65535

    # 开启鼠标
    set -g mouse on

    # 刷新状态栏的间隔时间(单位：秒，默认15)
    set -g status-interval 60

    # 不允许自动重命名当前窗口
    setw -g allow-rename off
    setw -g automatic-rename off

    # 当删除一个窗口时，自动重新排序窗口序号
    set-option -g renumber-windows on

    # 设置起始下标为1
    set -g base-index 1 # 窗口 - windows
    set -g pane-base-index 1 # 面板 - pane

    # 非当前 window 有内容更新时在状态栏通知
    setw -g monitor-activity on
# }}} basic #

# Variable {{{ #
    tmux_highlight_color='#50AEF4'
    tmux_normal_color='#444444'
    tmux_prefix_color='#E2C55E'

    tmux_status_separator_left="\uE0B2"
    tmux_status_separator_right="\uE0B0"

    tmux_enable_plugin=1

    tmux_zoom_flag="\uf00e"
# }}} Variable #

# appearance {{{ #
    set -g status-position top
    set-option -g status-justify centre

    setw -g status-bg $tmux_normal_color
    setw -g pane-active-border-style fg=$tmux_highlight_color

    set-window-option -g status-left " ❐ #S #[fg=$tmux_highlight_color,bg=$tmux_normal_color]$tmux_status_separator_right"
    set-window-option -g status-left-style fg=$tmux_normal_color,bg=$tmux_highlight_color

    if-shell '[ ${tmux_enable_plugin} -eq 1 ]' \
        'set-window-option -g status-right "#[fg=$tmux_highlight_color,bg=$tmux_normal_color]$tmux_status_separator_left#[default]#{?window_zoomed_flag, $tmux_zoom_flag,} #{sysstat_cpu} | #{sysstat_mem} | #{?client_prefix,#[bg=$tmux_prefix_color],}%Y/%m/%d-%H:%M "' \
        'set-window-option -g status-right "#[fg=$tmux_highlight_color,bg=$tmux_normal_color]$tmux_status_separator_left#[default]#{?window_zoomed_flag, $tmux_zoom_flag,} #{?client_prefix,#[bg=$tmux_prefix_color],}%Y/%m/%d-%H:%M "'

    set-window-option -g status-right-style fg=$tmux_normal_color,bg=$tmux_highlight_color

    setw -g window-status-style fg="#808080",bg=$tmux_normal_color
    setw -g window-status-format '『#I:#W '

    setw -g window-status-current-style fg=$tmux_normal_color,bg=$tmux_highlight_color,bold
    setw -g window-status-current-format "『#I:#W "

    setw -g window-status-last-style fg="#FFFFFF",bg=$tmux_normal_color

    setw -g message-style fg=$tmux_highlight_color,bg=$tmux_normal_color
    setw -g mode-style fg=$tmux_normal_color,bg=$tmux_highlight_color
# }}} appearance #

# key-binding {{{ #
    # 垂直方向新增面板，默认进入当前目录
    unbind '"'
    bind - splitw -v -c '#{pane_current_path}'
    # 水平方向新增面板，默认进入当前目录
    unbind %
    bind | splitw -h -c '#{pane_current_path}'

    # 重新加载配置文件
    bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

    # 绑定hjkl键为面板切换的上下左右键
    bind k select-pane -U # 绑定k为↑
    bind j select-pane -D # 绑定j为↓
    bind h select-pane -L # 绑定h为←
    bind l select-pane -R # 绑定l为→

    # 绑定Ctrl+hjkl键为面板上下左右调整边缘的快捷指令
    bind -r ^k resizep -U 5 # 绑定Ctrl+k为往↑调整面板边缘5个单元格
    bind -r ^j resizep -D 5 # 绑定Ctrl+j为往↓调整面板边缘5个单元格
    bind -r ^h resizep -L 5 # 绑定Ctrl+h为往←调整面板边缘5个单元格
    bind -r ^l resizep -R 5 # 绑定Ctrl+l为往→调整面板边缘5个单元格

    bind-key -n M-w last-window
    bind-key -n M-s switch-client -l
# }}} key-binding #

